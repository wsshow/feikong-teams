services:
  fkteams:
    build: .
    container_name: fkteams
    restart: unless-stopped
    ports:
      - "23456:23456"
    environment:
      # 模型配置（必填，若已挂载 config/config.toml 则以配置文件为准）
      - FEIKONG_BASE_URL=https://api.openai.com/v1
      - FEIKONG_API_KEY=your_api_key_here
      - FEIKONG_MODEL=GPT-5

      # 网络代理（可选）
      # - FEIKONG_PROXY_URL=http://host.docker.internal:7890

      # 应用数据目录（与 volumes 挂载路径对应）
      - FEIKONG_APP_DIR=/app
    volumes:
      # 持久化数据目录
      - ./data/config:/app/config
      - ./data/workspace:/app/workspace
      - ./data/history:/app/history
      - ./data/sessions:/app/sessions
      - ./data/result:/app/result
      - ./data/log:/app/log
